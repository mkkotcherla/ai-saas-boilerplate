name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/ai-saas-api:latest
            ${{ secrets.REGISTRY_URL }}/ai-saas-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_URL }}/ai-saas-api:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_URL }}/ai-saas-api:buildcache,mode=max

      - name: Deploy to Kubernetes
        uses: azure/k8s-deploy@v5
        with:
          manifests: |
            infrastructure/kubernetes/deployment.yaml
            infrastructure/kubernetes/service.yaml
          images: |
            ${{ secrets.REGISTRY_URL }}/ai-saas-api:${{ github.sha }}
          kubeconfig: ${{ secrets.KUBECONFIG }}

  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

  run-migrations:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma

  notify:
    name: Notify Deploy Status
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web, run-migrations]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "Deploy completed. Status:"
          echo "  API: ${{ needs.deploy-api.result }}"
          echo "  Web: ${{ needs.deploy-web.result }}"
          echo "  Migrations: ${{ needs.run-migrations.result }}"
