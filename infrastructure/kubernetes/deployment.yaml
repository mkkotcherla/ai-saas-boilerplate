apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-saas-web
  namespace: ai-saas
  labels:
    app: ai-saas-web
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-saas-web
  template:
    metadata:
      labels:
        app: ai-saas-web
        tier: frontend
    spec:
      containers:
        - name: web
          image: your-registry/ai-saas-web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ai-saas-config
            - secretRef:
                name: ai-saas-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
      terminationGracePeriodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-saas-api
  namespace: ai-saas
  labels:
    app: ai-saas-api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-saas-api
  template:
    metadata:
      labels:
        app: ai-saas-api
        tier: backend
    spec:
      containers:
        - name: api
          image: your-registry/ai-saas-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-saas-config
            - secretRef:
                name: ai-saas-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
      terminationGracePeriodSeconds: 30
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-saas-api-hpa
  namespace: ai-saas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-saas-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
